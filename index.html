<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Uni AI Tools - Windows 95 Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MS+Reference+Sans+Serif&display=swap');

  body {
    margin: 0;
    padding: 20px 20px 20px 280px;
    background: #008080 url('clouds.jpeg') center/cover no-repeat fixed;
    font-family: 'MS Reference Sans Serif', sans-serif;
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
  }

  .window {
    width: 520px;
    margin: 20px auto;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf;
    border-left: 2px solid #dfdfdf;
    border-bottom: 2px solid #808080;
    border-right: 2px solid #808080;
    box-shadow: 3px 3px 0 #000;
  }

  .title-bar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .content {
    padding: 15px;
    background: #c0c0c0;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 5px;
    background: white;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    font-family: inherit;
    margin-bottom: 8px;
  }

  button {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    padding: 8px 20px;
    font-weight: bold;
    cursor: pointer;
    margin: 10px 0;
  }

  button:active {
    border-color: #808080 #fff #fff #808080;
  }

  .result {
    margin-top: 12px;
    padding: 12px;
    background: #ffffff;
    border: 2px inset #c0c0c0;
    min-height: 110px;
    font-weight: bold;
    color: #000;
  }

  .status {
    background: #c0c0c0;
    border-top: 2px solid #808080;
    padding: 4px 8px;
    font-size: 11px;
    text-align: right;
  }

  /* Homework Icon */
  #homeworkIcon {
    position: fixed;
    left: 30px;
    top: 80px;
    width: 80px;
    text-align: center;
    color: white;
    text-shadow: 1px 1px 2px black;
    cursor: pointer;
    user-select: none;
  }

  #homeworkIcon img {
    width: 64px;
    height: 64px;
    display: block;
    margin: 0 auto 5px;
  }

  /* Lofi Player - smaller, under homework */
  #lofiPlayer {
    position: fixed;
    left: 30px;
    top: 220px;
    width: 160px;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf;
    border-left: 2px solid #dfdfdf;
    border-bottom: 2px solid #808080;
    border-right: 2px solid #808080;
    box-shadow: 3px 3px 0 #000;
    padding: 8px;
    font-size: 11px;
  }

  .lofi-title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .lofi-controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  button.lofi-btn {
    padding: 4px 8px;
    font-size: 11px;
  }

  input[type="range"] {
    width: 100%;
  }

  /* Pong Window */
  #pongWindow {
    position: fixed;
    top: 150px;
    left: 300px;
    width: 520px;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf;
    border-left: 2px solid #dfdfdf;
    border-bottom: 2px solid #808080;
    border-right: 2px solid #808080;
    box-shadow: 4px 4px 0 #000;
    display: none;
    z-index: 1000;
  }

  .pong-content {
    padding: 10px;
    background: #000;
  }

  canvas {
    display: block;
    margin: 0 auto;
    border: 2px solid #fff;
  }

  .pong-score {
    text-align: center;
    color: white;
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: bold;
  }

  /* Clippy */
  #clippy {
    position: fixed;
    right: 40px;
    top: 120px;
    width: 180px;
    z-index: 999;
    transition: top 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  #clippy img {
    width: 100%;
    image-rendering: pixelated;
    filter: drop-shadow(4px 4px 0 #000);
  }

  .speech-bubble {
    position: absolute;
    left: -230px;
    top: 20px;
    width: 210px;
    background: white;
    border: 3px solid #000;
    padding: 12px;
    font-size: 12px;
    line-height: 1.4;
    box-shadow: 3px 3px 0 #000;
    min-height: 60px;
  }

  .speech-bubble:after {
    content: '';
    position: absolute;
    right: -20px;
    top: 35px;
    border: 10px solid transparent;
    border-left-color: #000;
  }
</style>
</head>
<body>

<!-- Stacked non-closable windows -->
<div class="window">
  <div class="title-bar">
    <span>FutureJob™ v1.0 - Karrier Sors Előrejelző</span>
  </div>
  <div class="content">
    <p><strong>Üdvözöljük!</strong></p>
    <label>Név:</label><input type="text" id="name" value="Kovács Anna">
    <label>Életkor:</label><input type="number" id="age" value="21">
    <label>Szak:</label><input type="text" id="major" value="Info">
    <center><button onclick="predictJob()">ELŐREJELZÉS INDÍTÁSA</button></center>
    <div id="resultJob" class="result"></div>
  </div>
  <div class="status">Kész • 100% megbízható</div>
</div>

<div class="window">
  <div class="title-bar">
    <span>Professor Roast 95 - Oktatói Megszégyenítő</span>
  </div>
  <div class="content">
    <label>Írd be a tárgy nevét vagy a tanár nevét:</label>
    <input type="text" id="profInput" value="Prell Norbert">
    <button onclick="roastProfessor()">ROASTOLJUK MEG! 🔥</button>
    <div id="resultRoast" class="result"></div>
  </div>
  <div class="status">Figyelem: nagyon durva lehet</div>
</div>

<div class="window">
  <div class="title-bar">
    <span>AI Excuse Generator 1.0</span>
  </div>
  <div class="content">
    <label>Válaszd ki a szituációt:</label>
    <select id="excuseType">
      <option value="late">Késés az óráról</option>
      <option value="homework" selected>Elfelejtettem a házi feladatot</option>
      <option value="missed">Nem tudtam eljönni az órára</option>
      <option value="group">Csoportmunka nem készült el</option>
    </select>
    <button onclick="generateExcuse()">GENERÁLJ EXCUSE-T</button>
    <div id="resultExcuse" class="result"></div>
  </div>
  <div class="status">Kész</div>
</div>

<!-- Homework Icon -->
<div id="homeworkIcon" onclick="openPong()">
  <img src="homework.png" alt="Homework">
  <div>Homework.exe</div>
</div>

<!-- Lofi Player - smaller, under homework -->
<div id="lofiPlayer">
  <div class="lofi-title">Lofi Girl Radio</div>
  <div class="lofi-controls">
    <button class="lofi-btn" id="playBtn">▶ Play</button>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
    <div style="font-size:10px; text-align:center;" id="timeDisplay">0:00 / 0:00</div>
  </div>
</div>

<!-- Pong Window -->
<div id="pongWindow">
  <div class="title-bar">
    <span>Pong 1995 - Homework Breaker</span>
    <span onclick="closePong()">×</span>
  </div>
  <div class="pong-content">
    <div class="pong-score" id="score">Játékos: 0  AI: 0</div>
    <canvas id="pongCanvas" width="480" height="320"></canvas>
  </div>
</div>

<!-- Clippy -->
<div id="clippy">
  <img id="clippyImg" src="clippy.gif" alt="Clippy">
  <div id="bubble" class="speech-bubble"></div>
</div>

<script>
// ====================== CLIPPY + TYPEWRITER ======================
function speak(text) {
  const bubble = document.getElementById("bubble");
  const img = document.getElementById("clippyImg");
  
  // Restart GIF
  const currentSrc = img.src;
  img.src = '';
  setTimeout(() => img.src = currentSrc, 10);

  // Typewriter
  bubble.innerHTML = '';
  let i = 0;
  function type() {
    if (i < text.length) {
      bubble.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 30);
    }
  }
  type();
}

// ====================== LOFI PLAYER ======================
const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); // replace with your own lofi if you want
audio.loop = true;

const playBtn = document.getElementById('playBtn');
const volumeSlider = document.getElementById('volumeSlider');
const timeDisplay = document.getElementById('timeDisplay');

playBtn.addEventListener('click', () => {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = '❚❚ Pause';
  } else {
    audio.pause();
    playBtn.textContent = '▶ Play';
  }
});

volumeSlider.addEventListener('input', () => {
  audio.volume = volumeSlider.value;
});

audio.addEventListener('timeupdate', () => {
  const current = Math.floor(audio.currentTime);
  const duration = Math.floor(audio.duration) || 0;
  timeDisplay.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
});

function formatTime(seconds) {
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60);
  return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

// ====================== PONG (Left/Right arrows) ======================
let canvas = document.getElementById('pongCanvas');
let ctx = canvas.getContext('2d');
let scorePlayer = 0, scoreAI = 0;
let paddleHeight = 80, paddleWidth = 10, ballSize = 10;
let playerY = canvas.height / 2 - paddleHeight / 2;
let aiY = canvas.height / 2 - paddleHeight / 2;
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let ballSpeedX = 5;
let ballSpeedY = 3;
let upPressed = false;
let downPressed = false;

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#fff';
  ctx.setLineDash([5, 15]);
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 0);
  ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#fff';
  ctx.fillRect(10, playerY, paddleWidth, paddleHeight);
  ctx.fillRect(canvas.width - 20, aiY, paddleWidth, paddleHeight);
  ctx.fillRect(ballX, ballY, ballSize, ballSize);
}

function update() {
  if (upPressed && playerY > 0) playerY -= 8;
  if (downPressed && playerY < canvas.height - paddleHeight) playerY += 8;

  if (aiY + paddleHeight/2 < ballY) aiY += 6;
  if (aiY + paddleHeight/2 > ballY) aiY -= 6;

  ballX += ballSpeedX;
  ballY += ballSpeedY;

  if (ballY <= 0 || ballY >= canvas.height - ballSize) ballSpeedY = -ballSpeedY;

  if (ballX <= 20 && ballY > playerY && ballY < playerY + paddleHeight) ballSpeedX = -ballSpeedX * 1.05;
  if (ballX >= canvas.width - 30 && ballY > aiY && ballY < aiY + paddleHeight) ballSpeedX = -ballSpeedX * 1.05;

  if (ballX < 0) { scoreAI++; resetBall(); }
  if (ballX > canvas.width) { scorePlayer++; resetBall(); }

  document.getElementById('score').textContent = `Játékos: ${scorePlayer}  AI: ${scoreAI}`;
}

function resetBall() {
  ballX = canvas.width / 2;
  ballY = canvas.height / 2;
  ballSpeedX = (Math.random() > 0.5 ? 5 : -5);
  ballSpeedY = (Math.random() * 6 - 3);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') upPressed = true;
  if (e.key === 'ArrowRight') downPressed = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft') upPressed = false;
  if (e.key === 'ArrowRight') downPressed = false;
});

function openPong() {
  document.getElementById('pongWindow').style.display = 'block';
  scorePlayer = 0;
  scoreAI = 0;
  resetBall();
}

function closePong() {
  document.getElementById('pongWindow').style.display = 'none';
}

gameLoop();

// ====================== YOUR TOOLS ======================
function predictJob() {
  const name = document.getElementById("name").value || "Névtelen";
  const jobList = ["Lélekromboló Táblázat Elemző","Senior Excel Majom","Hivatalos Meeting Ütemező","Nyomtató Elakadás Szakértő","Kávéfutár Koordinátor","Belépő Szintű Exisztenciális Szorongás Menedzser"];
  const job = jobList[Math.floor(Math.random() * jobList.length)];
  const salary = (Math.random() * 25 + 280).toFixed(0) + "e Ft/hó";

  document.getElementById("resultJob").innerHTML = `
    <strong>Tisztelt ${name}!</strong><br><br>
    Jövőbeli pozíció: <span style="color:#000080; font-size:16px;">${job}</span><br>
    Fizetés: ${salary}<br>
    Juttatások: Nincsenek<br>
    Lélekvesztés: 94%
  `;
  speak("Haha, gratulálok a rabszolgasághoz!");
}

function roastProfessor() {
  const input = document.getElementById("profInput").value.trim() || "ez a tanár";
  const roasts = [
    `${input} órája olyan, mintha egy részeg kakadu próbálna matekot tanítani egy pszichiátriai osztályon.`,
    `Ha ${input} azt mondja „ez egyszerű”, akkor a lelked 3 óra alatt öngyilkos lesz a táblánál.`,
    `${input} nem tanár, hanem biológiai fegyver a hallgatók mentális egészsége ellen.`,
    `Dr. ${input} hangja olyan, mint a fehér zaj, csak rosszabb – mert még fizetünk is érte.`,
    `${input} tárgya miatt már a negyedik öngyilkos gondolatom van ezen a héten, és még csak szerda van.`,
    `Ha ${input} mosolyogna, a diákok kollektív szívrohamot kapnának a sokktól.`
  ];
  const roast = roasts[Math.floor(Math.random() * roasts.length)];
  document.getElementById("resultRoast").innerHTML = roast;
  speak("BRUH... ez még nekem is fájt.");
}

function generateExcuse() {
  const type = document.getElementById("excuseType").value;
  const excuses = {
    late: ["A busz elment előttem 2 perccel.", "A kutyám megette az ébresztőórámat."],
    homework: ["A laptopom tegnap este öngyilkos lett.", "A házi feladatot a felhőbe mentettem, de a felhő most esik."],
    missed: ["Hirtelen allergiás reakciót kaptam a tudományra."],
    group: ["A csoporttársaim mind eltűntek.", "Miután én készítettem a részt, a többiek „fejlesztették” tovább… szóval nincs kész."]
  };
  const exc = excuses[type][Math.floor(Math.random() * excuses[type].length)];
  document.getElementById("resultExcuse").innerHTML = exc;
  speak("Ez az excuse gyengébb, mint a te motivációd az egyetemen.");
}
</script>

</body>
</html>
