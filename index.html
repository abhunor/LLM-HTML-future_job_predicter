<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>FutureJob™ v1.0 - Hivatalos Karrier Előrejelző</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MS+Reference+Sans+Serif&display=swap');

  body {
    margin: 0;
    padding: 30px;
    background: #008080; /* Win95 desktop teal */
    font-family: 'MS Reference Sans Serif', sans-serif;
    font-size: 13px;
    color: #000;
  }

  .window {
    width: 560px;
    margin: 0 auto;
    background: #c0c0c0;
    border: 2px solid #dfdfdf;
    border-bottom-color: #808080;
    border-right-color: #808080;
    box-shadow: 3px 3px 0 #000;
  }

  .title-bar {
    background: linear-gradient(to right, #000080 0%, #1084d0 100%);
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }

  .title-bar span { font-size: 14px; }

  .content {
    padding: 12px 16px;
    background: #c0c0c0;
    border-top: 2px solid #fff;
  }

  table { width: 100%; }
  td { padding: 5px 3px; vertical-align: middle; }
  label { font-weight: normal; }

  input[type="text"], input[type="number"] {
    width: 300px;
    background: #fff;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    padding: 4px;
    font-family: inherit;
  }

  .btn {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    padding: 8px 24px;
    font-weight: bold;
    cursor: pointer;
    margin: 10px 0;
  }

  .btn:active {
    border-color: #808080 #fff #fff #808080;
  }

  #result {
    margin-top: 15px;
    padding: 10px;
    background: #fff;
    border: 2px inset #c0c0c0;
    min-height: 120px;
    font-weight: bold;
    line-height: 1.4;
  }

  .status {
    background: #c0c0c0;
    border-top: 2px solid #808080;
    padding: 4px 8px;
    font-size: 11px;
    text-align: right;
  }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <span>FutureJob™ - Karrier Sors Előrejelző Program</span>
    <span>■ □ ×</span>
  </div>

  <div class="content">
    <p><strong>Üdvözöljük a FutureJob™ rendszerben!</strong><br>
    Ez a program a Microsoft® és a Stanley Parable hivatalos együttműködésével készült.</p>

    <table>
      <tr><td>Név:</td><td><input type="text" id="name" placeholder="pl. Kovács János"></td></tr>
      <tr><td>Életkor:</td><td><input type="number" id="age" value="22"></td></tr>
      <tr><td>Szak/Szakirány:</td><td><input type="text" id="major" placeholder="pl. Informatika"></td></tr>
    </table>

    <center>
      <button class="btn" onclick="predictJob()">ELŐREJELZÉS INDÍTÁSA</button>
    </center>

    <div id="result"></div>
  </div>

  <div class="status">
    Kész | 100% megbízhatóság | Narrátor üzemmódban
  </div>
</div>

<script>
const jobs = [
  "Senior Excel Majom",
  "Hivatalos Meeting Ütemező",
  "PowerPoint Diakészítő (Szint 5)",
  "Nyomtató Elakadás Szakértő",
  "Kávéfutár Koordinátor",
  "TPS Jelentés Kitöltő",
  "Zoom Háttér Kurátor",
  "Emberi CAPTCHA Megoldó",
  "Lélekromboló Táblázat Elemző",
  "Belépő Szintű Exisztenciális Szorongás Menedzser"
];

function predictJob() {
  const name = document.getElementById("name").value.trim() || "Névtelen Alkalmazott";
  const age = document.getElementById("age").value || "22";
  const major = document.getElementById("major").value.trim() || "Ismeretlen";

  const job = jobs[Math.floor(Math.random() * jobs.length)];
  const salary = (Math.random() * 18 + 28).toFixed(0) + "e Ft/hó";

  const resultHTML = `
    <strong>Tisztelt ${name}!</strong><br><br>
    A FutureJob™ fejlett algoritmusa szerint<br>
    ${age} éves korában Ön a következő pozíciót fogja betölteni:<br><br>
    <span style="color:#000080; font-size:17px;">${job}</span><br><br>
    Kezdő fizetés: ${salary}<br>
    Juttatások: Nincsenek<br>
    Éves lélekvesztés: 92%<br><br>
    Sok sikert a jövőben. A Narrátor már várja Önt az irodában.
  `;

  document.getElementById("result").innerHTML = resultHTML;

  // Stanley Parable-stílusú narrátor (böngésző beszéd)
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(
      `Ez a történet egy emberről szól, akit ${name}nak hívnak. Ő éppen most tudja meg, hogy a jövője ${job} lesz. Fizetés: ${salary}. Gratulálok.`
    );
    utterance.rate = 0.95;
    utterance.pitch = 1.05;
    window.speechSynthesis.speak(utterance);
  }
}
</script>

</body>
</html>
