<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Uni AI Tools - Windows 95 Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MS+Reference+Sans+Serif&display=swap');

  body {
    margin: 0;
    padding: 20px 20px 20px 280px;
    background: #008080 url('clouds.jpeg') center/cover no-repeat fixed;
    font-family: 'MS Reference Sans Serif', sans-serif;
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .window {
    width: 520px;
    margin: 20px auto;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf;
    border-left: 2px solid #dfdfdf;
    border-bottom: 2px solid #808080;
    border-right: 2px solid #808080;
    box-shadow: 3px 3px 0 #000;
  }

  .title-bar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title-bar span:last-child {
    cursor: pointer;
    font-size: 16px;
  }

  .content {
    padding: 15px;
    background: #c0c0c0;
  }

  /* Desktop Icon */
  #homeworkIcon {
    position: fixed;
    left: 30px;
    top: 80px;
    width: 80px;
    text-align: center;
    color: white;
    text-shadow: 1px 1px 2px black;
    cursor: pointer;
    user-select: none;
  }

  #homeworkIcon img {
    width: 64px;
    height: 64px;
    display: block;
    margin: 0 auto 5px;
  }

  /* Pong Window */
  #pongWindow {
    position: fixed;
    top: 150px;
    left: 300px;
    width: 520px;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf;
    border-left: 2px solid #dfdfdf;
    border-bottom: 2px solid #808080;
    border-right: 2px solid #808080;
    box-shadow: 4px 4px 0 #000;
    display: none;
    z-index: 1000;
  }

  .pong-content {
    padding: 10px;
    background: #000;
  }

  canvas {
    display: block;
    margin: 0 auto;
    border: 2px solid #fff;
    image-rendering: pixelated;
  }

  .pong-score {
    text-align: center;
    color: white;
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: bold;
  }
</style>
</head>
<body>

<!-- Main Tools -->
<div class="window">
  <div class="title-bar">
    <span>FutureJob™ v1.0 - Karrier Sors Előrejelző</span>
    <span onclick="this.parentElement.parentElement.style.display='none'">×</span>
  </div>
  <div class="content">
    <p><strong>Üdvözöljük!</strong></p>
    <label>Név:</label><input type="text" id="name" value="Kovács Anna">
    <label>Életkor:</label><input type="number" id="age" value="21">
    <label>Szak:</label><input type="text" id="major" value="Info">
    <center><button onclick="predictJob()">ELŐREJELZÉS INDÍTÁSA</button></center>
    <div id="resultJob" class="result"></div>
  </div>
  <div class="status">Kész • 100% megbízható</div>
</div>

<div class="window">
  <div class="title-bar">
    <span>Professor Roast 95 - Oktatói Megszégyenítő</span>
    <span onclick="this.parentElement.parentElement.style.display='none'">×</span>
  </div>
  <div class="content">
    <label>Írd be a tárgy nevét vagy a tanár nevét:</label>
    <input type="text" id="profInput" value="Prell Norbert">
    <button onclick="roastProfessor()">ROASTOLJUK MEG! 🔥</button>
    <div id="resultRoast" class="result"></div>
  </div>
  <div class="status">Figyelem: nagyon durva lehet</div>
</div>

<div class="window">
  <div class="title-bar">
    <span>AI Excuse Generator 1.0</span>
    <span onclick="this.parentElement.parentElement.style.display='none'">×</span>
  </div>
  <div class="content">
    <label>Válaszd ki a szituációt:</label>
    <select id="excuseType">
      <option value="late">Késés az óráról</option>
      <option value="homework" selected>Elfelejtettem a házi feladatot</option>
      <option value="missed">Nem tudtam eljönni az órára</option>
      <option value="group">Csoportmunka nem készült el</option>
    </select>
    <button onclick="generateExcuse()">GENERÁLJ EXCUSE-T</button>
    <div id="resultExcuse" class="result"></div>
  </div>
  <div class="status">Kész</div>
</div>

<!-- Homework Icon (left side) -->
<div id="homeworkIcon" onclick="openPong()">
  <img src="homework.png" alt="Homework">
  <div>Homework.exe</div>
</div>

<!-- Pong Window -->
<div id="pongWindow">
  <div class="title-bar">
    <span>Pong 1995 - Homework Breaker</span>
    <span onclick="closePong()">×</span>
  </div>
  <div class="pong-content">
    <div class="pong-score" id="score">Játékos: 0  AI: 0</div>
    <canvas id="pongCanvas" width="480" height="320"></canvas>
  </div>
</div>

<!-- Clippy -->
<div id="clippy">
  <img id="clippyImg" src="clippy.gif" alt="Clippy">
  <div id="bubble" class="speech-bubble"></div>
</div>

<script>
// ====================== TYPEWRITER + CLIPPY ======================
function speak(text) {
  const bubble = document.getElementById("bubble");
  const img = document.getElementById("clippyImg");
  
  const currentSrc = img.src;
  img.src = '';
  setTimeout(() => img.src = currentSrc, 10);

  bubble.innerHTML = '';
  let i = 0;
  function type() {
    if (i < text.length) {
      bubble.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 25);
    }
  }
  type();
}

// ====================== PONG GAME ======================
let pongWindow = document.getElementById('pongWindow');
let canvas = document.getElementById('pongCanvas');
let ctx = canvas.getContext('2d');
let scorePlayer = 0;
let scoreAI = 0;

let paddleHeight = 80;
let paddleWidth = 10;
let ballSize = 10;

let playerY = canvas.height / 2 - paddleHeight / 2;
let aiY = canvas.height / 2 - paddleHeight / 2;
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let ballSpeedX = 5;
let ballSpeedY = 3;

let upPressed = false;
let downPressed = false;

function draw() {
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Center line
  ctx.strokeStyle = '#fff';
  ctx.setLineDash([5, 15]);
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 0);
  ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, playerY, paddleWidth, paddleHeight);           // Player
  ctx.fillRect(canvas.width - 20, aiY, paddleWidth, paddleHeight); // AI

  // Ball
  ctx.fillRect(ballX, ballY, ballSize, ballSize);
}

function update() {
  // Player movement
  if (upPressed && playerY > 0) playerY -= 8;
  if (downPressed && playerY < canvas.height - paddleHeight) playerY += 8;

  // AI movement (simple but decent)
  if (aiY + paddleHeight/2 < ballY) aiY += 6;
  if (aiY + paddleHeight/2 > ballY) aiY -= 6;

  // Ball movement
  ballX += ballSpeedX;
  ballY += ballSpeedY;

  // Wall bounce
  if (ballY <= 0 || ballY >= canvas.height - ballSize) ballSpeedY = -ballSpeedY;

  // Paddle collision
  if (ballX <= 20 && ballY > playerY && ballY < playerY + paddleHeight) {
    ballSpeedX = -ballSpeedX * 1.05;
  }
  if (ballX >= canvas.width - 30 && ballY > aiY && ballY < aiY + paddleHeight) {
    ballSpeedX = -ballSpeedX * 1.05;
  }

  // Scoring
  if (ballX < 0) {
    scoreAI++;
    resetBall();
  }
  if (ballX > canvas.width) {
    scorePlayer++;
    resetBall();
  }

  document.getElementById('score').textContent = `Játékos: ${scorePlayer}  AI: ${scoreAI}`;
}

function resetBall() {
  ballX = canvas.width / 2;
  ballY = canvas.height / 2;
  ballSpeedX = (Math.random() > 0.5 ? 5 : -5);
  ballSpeedY = (Math.random() * 6 - 3);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Keyboard controls
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') upPressed = true;
  if (e.key === 'ArrowDown') downPressed = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp') upPressed = false;
  if (e.key === 'ArrowDown') downPressed = false;
});

// Open / Close Pong
function openPong() {
  pongWindow.style.display = 'block';
  // Reset scores when opening
  scorePlayer = 0;
  scoreAI = 0;
  resetBall();
}

function closePong() {
  pongWindow.style.display = 'none';
}

// Start the game loop
gameLoop();

// ====================== YOUR EXISTING FUNCTIONS ======================
function predictJob() {
  const name = document.getElementById("name").value || "Névtelen";
  const jobList = ["Lélekromboló Táblázat Elemző","Senior Excel Majom","Hivatalos Meeting Ütemező","Nyomtató Elakadás Szakértő","Kávéfutár Koordinátor","Belépő Szintű Exisztenciális Szorongás Menedzser"];
  const job = jobList[Math.floor(Math.random() * jobList.length)];
  const salary = (Math.random() * 25 + 280).toFixed(0) + "e Ft/hó";

  document.getElementById("resultJob").innerHTML = `
    <strong>Tisztelt ${name}!</strong><br><br>
    Jövőbeli pozíció: <span style="color:#000080; font-size:16px;">${job}</span><br>
    Fizetés: ${salary}<br>
    Juttatások: Nincsenek<br>
    Lélekvesztés: 94%
  `;
  speak("Haha, gratulálok a rabszolgasághoz!");
}

function roastProfessor() {
  const input = document.getElementById("profInput").value.trim() || "ez a tanár";
  const roasts = [
    `${input} órája olyan, mintha egy részeg kakadu próbálna matekot tanítani egy pszichiátriai osztályon.`,
    `Ha ${input} azt mondja „ez egyszerű”, akkor a lelked 3 óra alatt öngyilkos lesz a táblánál.`,
    `${input} nem tanár, hanem biológiai fegyver a hallgatók mentális egészsége ellen.`,
    `Dr. ${input} hangja olyan, mint a fehér zaj, csak rosszabb – mert még fizetünk is érte.`,
    `${input} tárgya miatt már a negyedik öngyilkos gondolatom van ezen a héten, és még csak szerda van.`,
    `Ha ${input} mosolyogna, a diákok kollektív szívrohamot kapnának a sokktól.`
  ];
  const roast = roasts[Math.floor(Math.random() * roasts.length)];
  document.getElementById("resultRoast").innerHTML = roast;
  speak("BRUH... ez még nekem is fájt.");
}

function generateExcuse() {
  const type = document.getElementById("excuseType").value;
  const excuses = {
    late: ["A busz elment előttem 2 perccel.", "A kutyám megette az ébresztőórámat."],
    homework: ["A laptopom tegnap este öngyilkos lett.", "A házi feladatot a felhőbe mentettem, de a felhő most esik."],
    missed: ["Hirtelen allergiás reakciót kaptam a tudományra."],
    group: ["A csoporttársaim mind eltűntek.", "Miután én készítettem a részt, a többiek „fejlesztették” tovább… szóval nincs kész."]
  };
  const exc = excuses[type][Math.floor(Math.random() * excuses[type].length)];
  document.getElementById("resultExcuse").innerHTML = exc;
  speak("Ez az excuse gyengébb, mint a te motivációd az egyetemen.");
}
</script>

</body>
</html>
