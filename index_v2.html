<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Windows 95 - Uni AI Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MS+Reference+Sans+Serif&display=swap');

  body {
    margin: 0;
    padding: 20px;
    background: #008080;
    font-family: 'MS Reference Sans Serif', sans-serif;
    font-size: 13px;
    color: #000;
    overflow: hidden;
  }

  .window {
    position: absolute;
    width: 460px;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf;
    border-left: 2px solid #dfdfdf;
    border-bottom: 2px solid #808080;
    border-right: 2px solid #808080;
    box-shadow: 3px 3px 0 #000;
    display: none;
  }

  .title-bar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: move;
  }

  .content {
    padding: 12px 16px;
    background: #c0c0c0;
  }

  input, textarea, select {
    width: 100%;
    background: white;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    padding: 4px;
    font-family: inherit;
    font-size: 13px;
  }

  button {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    padding: 6px 16px;
    font-weight: bold;
    cursor: pointer;
    margin: 8px 4px 0 0;
  }

  button:active {
    border-color: #808080 #fff #fff #808080;
  }

  .status-bar {
    background: #c0c0c0;
    border-top: 2px solid #808080;
    padding: 3px 8px;
    font-size: 11px;
  }

  #result1, #result2 { margin-top: 12px; padding: 10px; background: white; border: 2px inset #c0c0c0; min-height: 90px; }
</style>
</head>
<body>

<!-- ==================== FUTURE JOB WINDOW ==================== -->
<div id="winJob" class="window" style="top:60px; left:80px; display:block;">
  <div class="title-bar" onmousedown="dragStart(event, this.parentElement)">
    <span>FutureJob™ v1.0 - Karrier Sors Előrejelző</span>
    <span onclick="closeWindow('winJob')">×</span>
  </div>
  <div class="content">
    <p><strong>Üdvözöljük!</strong></p>
    <table style="width:100%">
      <tr><td>Név:</td><td><input type="text" id="name" placeholder="pl. Kovács Anna"></td></tr>
      <tr><td>Életkor:</td><td><input type="number" id="age" value="21"></td></tr>
      <tr><td>Szak:</td><td><input type="text" id="major" placeholder="pl. Gazdaságtudomány"></td></tr>
    </table>
    <center><button onclick="predictJob()">ELŐREJELZÉS INDÍTÁSA</button></center>
    <div id="resultJob"></div>
  </div>
  <div class="status-bar">Kész • 100% megbízható</div>
</div>

<!-- ==================== PROFESSOR ROAST WINDOW ==================== -->
<div id="winRoast" class="window" style="top:120px; left:280px;">
  <div class="title-bar" onmousedown="dragStart(event, this.parentElement)">
    <span>Professor Roast 95 - Oktatói Megszégyenítő</span>
    <span onclick="closeWindow('winRoast')">×</span>
  </div>
  <div class="content">
    <p><strong>Írd be a tárgy nevét vagy a tanár nevét:</strong></p>
    <input type="text" id="profInput" placeholder="pl. Dr. Szabó vagy Bevezetés a matekba">
    <button onclick="roastProfessor()">ROASTOLJUK MEG!</button>
    <div id="resultRoast"></div>
  </div>
  <div class="status-bar">Narrátor üzemmódban</div>
</div>

<!-- ==================== EXCUSE GENERATOR WINDOW ==================== -->
<div id="winExcuse" class="window" style="top:200px; left:180px;">
  <div class="title-bar" onmousedown="dragStart(event, this.parentElement)">
    <span>AI Excuse Generator 1.0</span>
    <span onclick="closeWindow('winExcuse')">×</span>
  </div>
  <div class="content">
    <p><strong>Válaszd ki a szituációt:</strong></p>
    <select id="excuseType">
      <option value="late">Késés az óráról</option>
      <option value="homework">Elfelejtettem a házi feladatot</option>
      <option value="missed">Nem tudtam eljönni az órára</option>
      <option value="group">Csoportmunka nem készült el</option>
    </select>
    <button onclick="generateExcuse()">GENERÁLJ EXCUSE-T</button>
    <div id="resultExcuse"></div>
  </div>
  <div class="status-bar">Kész</div>
</div>

<script>
// Simple drag function for windows
let dragElement = null;
let offsetX, offsetY;

function dragStart(e, win) {
  dragElement = win;
  offsetX = e.clientX - win.offsetLeft;
  offsetY = e.clientY - win.offsetTop;
  document.onmousemove = dragMove;
  document.onmouseup = dragStop;
}

function dragMove(e) {
  if (dragElement) {
    dragElement.style.left = (e.clientX - offsetX) + "px";
    dragElement.style.top  = (e.clientY - offsetY) + "px";
  }
}

function dragStop() {
  document.onmousemove = null;
  document.onmouseup = null;
  dragElement = null;
}

function closeWindow(id) {
  document.getElementById(id).style.display = "none";
}

// Future Job
function predictJob() {
  const name = document.getElementById("name").value || "Névtelen";
  const age = document.getElementById("age").value || "21";
  const major = document.getElementById("major").value || "Ismeretlen";

  const jobs = ["Senior Excel Majom","Hivatalos Meeting Ütemező","Nyomtató Elakadás Szakértő","Kávéfutár Koordinátor","Lélekromboló Táblázat Elemző","Belépő Szintű Exisztenciális Szorongás Menedzser"];
  const job = jobs[Math.floor(Math.random()*jobs.length)];
  const salary = (Math.random()*25 + 280).toFixed(0) + "e Ft/hó";

  document.getElementById("resultJob").innerHTML = `
    <strong>Tisztelt ${name}!</strong><br><br>
    Jövőbeli pozíció: <span style="color:#000080;font-size:16px;">${job}</span><br>
    Fizetés: ${salary}<br>
    Juttatások: Nincsenek<br>
    Lélekvesztés: 94%
  `;

  speak(`Gratulálok ${name}. A jövőben ${job} leszel.`);
}

// Professor Roast
function roastProfessor() {
  const input = document.getElementById("profInput").value || "a tanár";
  const roasts = [
    `${input} tanár órája hosszabb, mint a sor a menzán ebédidőben.`,
    `Dr. ${input} jegyzetei úgy néznek ki, mintha egy tyúk kaparta volna a billentyűzetet.`,
    `${input} tárgya miatt már a harmadik kávémat iszom, és még mindig nem értem semmit.`,
    `Ha ${input} azt mondja „ez egyszerű”, akkor készülj fel egy 3 órás szenvedésre.`
  ];
  const roast = roasts[Math.floor(Math.random()*roasts.length)];
  document.getElementById("resultRoast").innerHTML = `<strong>${roast}</strong>`;
  speak(roast);
}

// Excuse Generator
function generateExcuse() {
  const type = document.getElementById("excuseType").value;
  const excuses = {
    late: ["Sajnos a busz elment előttem 2 perccel, és a következő csak holnap jön.", "A kutyám megette az ébresztőórámat.", "Hirtelen jött egy fontos családi meeting a Netflixen."],
    homework: ["A házi feladatot a felhőbe mentettem, de a felhő most esik.", "A laptopom tegnap este öngyilkos lett.", "Elfelejtettem, hogy egyáltalán van házi."],
    missed: ["Hirtelen jött egy allergiás reakció a tudományra.", "Az ablakon keresztül láttam, hogy az előadóterem tele van, ezért inkább otthon maradtam tanulni.", "Az univerzum jelezte, hogy ma nem kell bemennem."],
    group: ["A csoporttársaim mind eltűntek, mint a házi feladatom.", "Miután én készítettem a részt, a többiek „fejlesztették” tovább… szóval nincs kész.", "Csoportmunka = senki nem csinál semmit, de mindenki panaszkodik."]
  };
  const exc = excuses[type][Math.floor(Math.random()*excuses[type].length)];
  document.getElementById("resultExcuse").innerHTML = `<strong>${exc}</strong>`;
  speak(exc);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'hu-HU';
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }
}

// Show the other two windows when the page loads
window.onload = () => {
  document.getElementById("winRoast").style.display = "block";
  document.getElementById("winExcuse").style.display = "block";
};
</script>

</body>
</html>
